<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta
        name="viewport"
        content="width=device-width, initial-scale=1.0"
    >

    <title>Register - Organ Donation</title>

    <link
        rel="stylesheet"
        href="style.css"
    >

</head>

<body>

    <div class="auth-container">

        <div class="auth-card">

            <h1>
                🩸 Organ Donation
            </h1>

            <p class="subtitle">
                Create your account.
            </p>

            <form action="index.html">

                <input
                    type="text"
                    placeholder="Full Name"
                    required
                >

                <input
                    type="email"
                    placeholder="Enter Email"
                    required
                >

                <input
                    type="password"
                    placeholder="Create Password"
                    required
                >

                <input
                    type="password"
                    placeholder="Confirm Password"
                    required
                >

                <button type="submit">
                    Register
                </button>

            </form>

            <p class="switch-text">

                Already have an account?

                <a href="index.html">
                    Login
                </a>

            </p>

        </div>

    </div>

</body>
</html>
