<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta
        name="viewport"
        content="width=device-width, initial-scale=1.0"
    >

    <title>Login - Organ Donation</title>

    <link
        rel="stylesheet"
        href="style.css"
    >

</head>

<body>

    <div class="auth-container">

        <div class="auth-card">

            <h1>
                🩸 Organ Donation
            </h1>

            <p class="subtitle">
                Welcome back! Login to continue.
            </p>

            <!-- LOGIN FORM -->

            <form id="loginForm">

                <input
                    id="loginEmail"
                    type="email"
                    placeholder="Enter Email"
                    required
                >

                <input
                    id="loginPassword"
                    type="password"
                    placeholder="Enter Password"
                    required
                >

                <button type="submit">
                    Login
                </button>

            </form>

            <!-- SWITCH -->

            <p class="switch-text">

                Don't have an account?

                <a href="register.html">
                    Register
                </a>

            </p>

        </div>

    </div>

    <script src="script.js"></script>

</body>
</html>
