<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login / Register Form</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <section id="auth" class="section-container">
        <h2>Login / Register</h2>
        <div class="form-container">
            <div class="tabs">
                <button id="signup-tab" class="active" onclick="switchForm('signup')">Sign Up</button>
                <button id="signin-tab" onclick="switchForm('signin')">Sign In</button>
            </div>

            <!-- Sign Up Form -->
            <form id="signup-form" class="active-form" onsubmit="return handleSignup(event)">
                <label for="user-type">I am a:</label>
                <select id="user-type" onchange="toggleCertificateField()">
                    <option value="donor">Donor</option>
                    <option value="hospital">Hospital</option>
                </select>

                <div id="certificate-field" class="hidden">
                    <label for="certificate">Upload Certificate:</label>
                    <input type="file" id="certificate" accept=".pdf, .jpg, .png" />
                </div>

                <input type="text" id="signup-username" placeholder="Username" required />
                <input type="password" id="signup-password" placeholder="Password" required />
                <button type="submit">Register</button>
            </form>

            <!-- Sign In Form -->
            <form id="signin-form" class="hidden" onsubmit="return handleSignin(event)">
                <input type="text" id="signin-username" placeholder="Username" required />
                <input type="password" id="signin-password" placeholder="Password" required />
                <button type="submit">Login</button>
            </form>
        </div>
    </section>

    <script src="script.js"></script>
</body>
</html>
